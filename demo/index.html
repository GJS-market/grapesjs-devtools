<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>grapesjs-devtools — live demo</title>
    <link rel="stylesheet" href="./demo.css" />
  </head>
  <body>
    <header class="demo-bar">
      <div class="demo-brand">
        <span class="demo-brand-mark">GJS</span>
        <span class="demo-brand-name">grapesjs-devtools</span>
      </div>

      <nav class="demo-switch" aria-label="Editor environment">
        <a
          class="demo-switch-btn"
          data-mode="webpage"
          href="?mode=webpage"
          role="button"
        >
          Webpage preset
        </a>
        <a
          class="demo-switch-btn"
          data-mode="studio"
          href="?mode=studio"
          role="button"
        >
          Studio
        </a>
      </nav>

      <p class="demo-hint">
        Press <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>D</kbd>
        <span class="demo-hint-mac">(<kbd>⌘</kbd>+<kbd>Shift</kbd>+<kbd>D</kbd>)</span>
        for devtools
      </p>
    </header>

    <main id="editor" class="demo-editor"></main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
