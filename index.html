<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>grapesjs-devtools — dev sandbox</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #gjs {
        border: none;
      }
    </style>
  </head>
  <body>
    <div id="gjs">
      <div style="padding: 40px; font-family: sans-serif">
        <h1 class="title">Hello devtools</h1>
        <p class="para">
          Press <kbd>Ctrl+Shift+D</kbd> (<kbd>⌘+Shift+D</kbd> on Mac) to toggle
          the developer panel. Select
          elements, watch the event log, or run <code>editor.getHtml()</code> in
          the console. Try the AI tab, or the dock switcher in the panel header.
        </p>
        <a href="#" class="link">A link</a>
      </div>
    </div>

    <!-- GrapesJS + the plugin are resolved from node_modules by Vite — no CDN. -->
    <script type="module">
      import grapesjs from 'grapesjs';
      import 'grapesjs/dist/css/grapes.min.css';
      import devtools from './src/index.ts';

      const editor = grapesjs.init({
        container: '#gjs',
        height: '100vh',
        fromElement: true,
        storageManager: false,
        plugins: [
          (ed) =>
            devtools(ed, {
              enabled: true,
              position: 'right',
              theme: 'dark',
            }),
        ],
      });

      // Expose for manual poking in the console.
      window.editor = editor;
    </script>
  </body>
</html>
